<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1F4D3A"/>
      <stop offset="100%" stop-color="#0B1F1A"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A227" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A227" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0B93A"/>
      <stop offset="100%" stop-color="#C9A227"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- Glow center -->
  <ellipse cx="250" cy="220" rx="220" ry="200" fill="url(#glow)"/>

  <!-- Ticket shape (fond blanc cassé) -->
  <rect x="80" y="130" width="340" height="240" rx="14" fill="#F4F1E8"/>

  <!-- Découpe ronde gauche et droite (effet ticket) -->
  <circle cx="80" cy="270" r="22" fill="#0B1F1A"/>
  <circle cx="420" cy="270" r="22" fill="#0B1F1A"/>

  <!-- Ligne pointillée -->
  <line x1="102" y1="270" x2="398" y2="270" stroke="#0B1F1A" stroke-width="2" stroke-dasharray="10,8" opacity="0.2"/>

  <!-- Bande dorée top du ticket -->
  <rect x="80" y="130" width="340" height="6" rx="0" fill="url(#gold)"/>
  <rect x="80" y="130" width="340" height="6" rx="14" fill="url(#gold)"/>

  <!-- LT monogramme -->
  <text x="250" y="248"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="96"
    fill="#0B1F1A"
    text-anchor="middle"
    letter-spacing="-4">LT</text>

  <!-- Sous-texte -->
  <text x="250" y="315"
    font-family="Arial, sans-serif"
    font-weight="700"
    font-size="18"
    fill="#0B1F1A"
    text-anchor="middle"
    letter-spacing="8"
    opacity="0.45">LE TICKET</text>

  <!-- Trait doré décoratif bas -->
  <rect x="170" y="328" width="160" height="3" rx="2" fill="url(#gold)" opacity="0.6"/>

  <!-- Point doré gauche logo -->
  <rect x="96" y="148" width="8" height="20" rx="1" fill="url(#gold)" transform="skewX(-8)"/>

  <!-- Étoile / point déco coin bas droit -->
  <circle cx="390" cy="390" r="4" fill="#C9A227" opacity="0.5"/>
  <circle cx="110" cy="390" r="4" fill="#C9A227" opacity="0.5"/>
</svg>
